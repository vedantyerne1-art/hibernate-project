spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": false

  flyway:
    enabled: true
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

logging:
  level:
    root: INFO
    "[org.springframework.security]": INFO
    "[com.trustid]": INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
