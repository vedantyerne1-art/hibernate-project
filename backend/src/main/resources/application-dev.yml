spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/trustid_db
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080
  
logging:
  level:
    "[org.springframework.security]": DEBUG
    "[com.trustid]": DEBUG

app:
  admin-bootstrap:
    enabled: true
    full-name: Dev Admin
    email: admin@trustid.local
    password: Admin@12345
